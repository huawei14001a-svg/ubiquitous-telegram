<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Топливо Радар — Сургут</title>

    <!-- Leaflet + TomTom tiles -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>

    <!-- Font Awesome (только для иконок интерфейса) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ===== Базовые переменные Telegram ===== */
        :root {
            --tg-bg: #0f0f12;
            --tg-bg-secondary: #1c1c1e;
            --tg-bg-card: #28282b;
            --tg-bg-input: #3a3a3e;
            --tg-text: #ffffff;
            --tg-text-secondary: #8e8e93;
            --tg-text-hint: #5c5c60;
            --tg-accent: #5c9ce6;
            --tg-accent-hover: #4a8cd4;
            --tg-accent-bg: rgba(92, 156, 230, 0.15);
            --tg-border: #3a3a3e;
            --tg-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --tg-radius: 16px;
            --tg-radius-sm: 10px;
            --tg-radius-xs: 6px;
            --tg-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --tg-green: #43b581;
            --tg-orange: #faa61a;
            --tg-red: #f04747;
            --tg-yellow: #faa61a;
            --tg-blue: #5c9ce6;
            --tg-gray: #8e8e93;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--tg-font);
            background: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* ===== КАРТА (Leaflet) ===== */
        #map {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            background: #1a1a1a;
        }

        /* ===== Шапка ===== */
        #app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--tg-bg-secondary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-border);
            min-height: 56px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        #app-header * {
            pointer-events: auto;
        }

        #app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        #app-header .logo i {
            color: var(--tg-accent);
            font-size: 22px;
        }
        #app-header .logo span {
            background: linear-gradient(135deg, #5c9ce6, #7b5ce6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #header-actions .badge {
            background: var(--tg-accent-bg);
            color: var(--tg-accent);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid rgba(92, 156, 230, 0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #header-actions .badge i {
            font-size: 10px;
        }

        .btn-icon {
            background: var(--tg-bg-card);
            border: none;
            color: var(--tg-text);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--tg-border);
        }
        .btn-icon:hover {
            background: var(--tg-bg-input);
        }
        .btn-icon:active {
            transform: scale(0.92);
        }

        /* ===== Кнопка "Моё местоположение" ===== */
        #locate-btn {
            position: fixed;
            bottom: 140px;
            right: 16px;
            z-index: 100;
            background: var(--tg-bg-card);
            border: 1px solid var(--tg-border);
            color: var(--tg-text);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--tg-shadow);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        #locate-btn:hover {
            background: var(--tg-bg-input);
            transform: scale(1.05);
        }
        #locate-btn:active {
            transform: scale(0.92);
        }

        /* ===== Панель снизу (Bottom Sheet) ===== */
        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 500;
            background: var(--tg-bg-secondary);
            border-radius: var(--tg-radius) var(--tg-radius) 0 0;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.7);
            max-height: 85vh;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            border-top: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #bottom-sheet.open {
            transform: translateY(0);
        }

        #bottom-sheet .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--tg-text-hint);
            border-radius: 4px;
            margin: 10px auto 6px;
            flex-shrink: 0;
            cursor: grab;
        }

        #bottom-sheet .sheet-header {
            padding: 8px 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid var(--tg-border);
        }

        #bottom-sheet .sheet-header h3 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #bottom-sheet .sheet-header h3 i {
            color: var(--tg-accent);
        }

        #bottom-sheet .sheet-close {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        #bottom-sheet .sheet-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== Стили внутри bottom sheet ===== */
        .station-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .station-name .station-id {
            font-size: 11px;
            font-weight: 400;
            color: var(--tg-text-secondary);
            background: var(--tg-bg-card);
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid var(--tg-border);
        }
        .station-address {
            font-size: 14px;
            color: var(--tg-text-secondary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .station-address i {
            font-size: 12px;
            color: var(--tg-text-hint);
        }

        /* Логотип станции */
        .station-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--tg-border);
            margin-right: 12px;
            background: var(--tg-bg-card);
            padding: 4px;
        }
        .station-logo-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        /* Fuel chips */
        .fuel-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 14px;
        }
        .fuel-chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--tg-border);
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--tg-bg-card);
            transition: all 0.2s;
        }
        .fuel-chip .fuel-price {
            font-weight: 400;
            font-size: 12px;
            color: var(--tg-text-secondary);
        }
        .fuel-chip.available {
            border-color: var(--tg-green);
            background: rgba(67, 181, 129, 0.12);
            color: var(--tg-green);
        }
        .fuel-chip.unavailable {
            opacity: 0.45;
            text-decoration: line-through;
        }
        .fuel-chip .fuel-status {
            font-size: 10px;
        }

        /* Queue status */
        .queue-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 14px;
            padding: 10px 14px;
            background: var(--tg-bg-card);
            border-radius: var(--tg-radius-sm);
            border: 1px solid var(--tg-border);
            flex-wrap: wrap;
        }
        .queue-section .queue-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--tg-text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .queue-section .queue-label i {
            font-size: 14px;
        }
        .queue-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .queue-badge.none {
            background: rgba(142, 142, 147, 0.2);
            color: var(--tg-text-secondary);
        }
        .queue-badge.low {
            background: rgba(67, 181, 129, 0.2);
            color: var(--tg-green);
        }
        .queue-badge.medium {
            background: rgba(250, 166, 26, 0.2);
            color: var(--tg-orange);
        }
        .queue-badge.high {
            background: rgba(240, 71, 71, 0.2);
            color: var(--tg-red);
        }

        .queue-actions {
            display: flex;
            gap: 6px;
            margin-left: auto;
            flex-wrap: wrap;
        }
        .queue-actions button {
            background: var(--tg-bg-input);
            border: none;
            color: var(--tg-text-secondary);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .queue-actions button:hover {
            background: var(--tg-bg-card);
            color: var(--tg-text);
        }
        .queue-actions button.active {
            background: var(--tg-accent);
            color: #fff;
        }

        /* ===== Комментарии ===== */
        .comments-section {
            margin-top: 16px;
            border-top: 1px solid var(--tg-border);
            padding-top: 14px;
        }
        .comments-section .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .comments-section .section-title i {
            color: var(--tg-accent);
        }

        .comment-item {
            background: var(--tg-bg-card);
            border-radius: var(--tg-radius-sm);
            padding: 12px 14px;
            margin-bottom: 10px;
            border: 1px solid var(--tg-border);
        }
        .comment-item .comment-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--tg-text-secondary);
            margin-bottom: 4px;
        }
        .comment-item .comment-meta .comment-user {
            font-weight: 600;
            color: var(--tg-text);
        }
        .comment-item .comment-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        .comment-item .comment-photos {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .comment-item .comment-photos img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: var(--tg-radius-xs);
            border: 1px solid var(--tg-border);
            cursor: pointer;
            transition: transform 0.15s;
        }
        .comment-item .comment-photos img:hover {
            transform: scale(1.05);
        }
        .comment-item .comment-delete {
            background: none;
            border: none;
            color: var(--tg-text-hint);
            font-size: 12px;
            cursor: pointer;
            margin-top: 6px;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .comment-item .comment-delete:hover {
            color: var(--tg-red);
            background: rgba(240, 71, 71, 0.1);
        }

        /* Форма добавления комментария */
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
            background: var(--tg-bg-card);
            border-radius: var(--tg-radius-sm);
            padding: 12px;
            border: 1px solid var(--tg-border);
        }
        .comment-form textarea {
            width: 100%;
            background: var(--tg-bg-input);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius-xs);
            padding: 10px 12px;
            color: var(--tg-text);
            font-size: 14px;
            font-family: var(--tg-font);
            resize: vertical;
            min-height: 60px;
            transition: border 0.2s;
        }
        .comment-form textarea:focus {
            outline: none;
            border-color: var(--tg-accent);
        }
        .comment-form textarea::placeholder {
            color: var(--tg-text-hint);
        }

        .comment-form .form-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .comment-form .form-actions .photo-upload-btn {
            background: var(--tg-bg-input);
            border: 1px solid var(--tg-border);
            color: var(--tg-text-secondary);
            padding: 8px 14px;
            border-radius: var(--tg-radius-xs);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .comment-form .form-actions .photo-upload-btn:hover {
            background: var(--tg-bg-card);
            color: var(--tg-text);
        }
        .comment-form .form-actions .photo-upload-btn i {
            font-size: 14px;
        }

        .comment-form .form-actions .submit-comment {
            background: var(--tg-accent);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: var(--tg-radius-xs);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }
        .comment-form .form-actions .submit-comment:hover {
            background: var(--tg-accent-hover);
        }
        .comment-form .form-actions .submit-comment:active {
            transform: scale(0.96);
        }

        .comment-form .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        .comment-form .photo-preview img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: var(--tg-radius-xs);
            border: 1px solid var(--tg-border);
        }
        .comment-form .photo-preview .remove-photo {
            position: relative;
            top: -20px;
            left: -8px;
            background: var(--tg-red);
            border: none;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Обновление топлива ===== */
        .fuel-update-section {
            margin: 8px 0 10px;
            padding: 10px 14px;
            background: var(--tg-bg-card);
            border-radius: var(--tg-radius-sm);
            border: 1px solid var(--tg-border);
        }
        .fuel-update-section .fuel-toggle-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 12px;
            margin: 3px 0;
        }
        .fuel-update-section .fuel-toggle-row label {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .fuel-update-section .fuel-toggle-row label:hover {
            background: var(--tg-bg-input);
        }
        .fuel-update-section .fuel-toggle-row input[type="checkbox"] {
            accent-color: var(--tg-accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .fuel-update-section .fuel-toggle-row .fuel-price-input {
            width: 60px;
            background: var(--tg-bg-input);
            border: 1px solid var(--tg-border);
            border-radius: 4px;
            padding: 2px 6px;
            color: var(--tg-text);
            font-size: 12px;
            text-align: center;
        }
        .fuel-update-section .fuel-toggle-row .fuel-price-input:focus {
            outline: none;
            border-color: var(--tg-accent);
        }
        .fuel-update-section .fuel-toggle-row .fuel-price-input::placeholder {
            color: var(--tg-text-hint);
            font-size: 10px;
        }

        .fuel-update-section .save-fuels-btn {
            margin-top: 8px;
            background: var(--tg-accent);
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: var(--tg-radius-xs);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .fuel-update-section .save-fuels-btn:hover {
            background: var(--tg-accent-hover);
        }

        /* ===== Список заправок ===== */
        #station-list-toggle {
            position: fixed;
            bottom: 200px;
            right: 16px;
            z-index: 100;
            background: var(--tg-bg-card);
            border: 1px solid var(--tg-border);
            color: var(--tg-text);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: var(--tg-shadow);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        #station-list-toggle:hover {
            background: var(--tg-bg-input);
            transform: scale(1.05);
        }
        #station-list-toggle:active {
            transform: scale(0.92);
        }

        /* ===== Список заправок (панель) ===== */
        #station-list-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 600;
            background: var(--tg-bg-secondary);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            padding-top: max(12px, env(safe-area-inset-top));
        }
        #station-list-panel.open {
            transform: translateX(0);
        }

        #station-list-panel .panel-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-border);
            flex-shrink: 0;
        }
        #station-list-panel .panel-header h4 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #station-list-panel .panel-header h4 i {
            color: var(--tg-accent);
        }
        #station-list-panel .panel-close {
            background: var(--tg-bg-card);
            border: 1px solid var(--tg-border);
            color: var(--tg-text);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #station-list-panel .panel-close:hover {
            background: var(--tg-bg-input);
        }

        #station-list-panel .panel-search {
            padding: 10px 16px;
            flex-shrink: 0;
        }
        #station-list-panel .panel-search input {
            width: 100%;
            background: var(--tg-bg-input);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius-xs);
            padding: 10px 14px;
            color: var(--tg-text);
            font-size: 14px;
        }
        #station-list-panel .panel-search input:focus {
            outline: none;
            border-color: var(--tg-accent);
        }
        #station-list-panel .panel-search input::placeholder {
            color: var(--tg-text-hint);
        }

        #station-list-panel .panel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        #station-list-panel .panel-list .station-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--tg-bg-card);
            border-radius: var(--tg-radius-sm);
            margin-bottom: 6px;
            border: 1px solid var(--tg-border);
            cursor: pointer;
            transition: all 0.15s;
        }
        #station-list-panel .panel-list .station-list-item:hover {
            background: var(--tg-bg-input);
        }
        #station-list-panel .panel-list .station-list-item .sli-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #station-list-panel .panel-list .station-list-item .sli-left img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--tg-border);
            background: var(--tg-bg-card);
        }
        #station-list-panel .panel-list .station-list-item .sli-name {
            font-weight: 500;
            font-size: 14px;
        }
        #station-list-panel .panel-list .station-list-item .sli-info {
            font-size: 12px;
            color: var(--tg-text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #station-list-panel .panel-list .station-list-item .sli-info .queue-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        #station-list-panel .panel-list .station-list-item .sli-info .queue-dot.none {
            background: var(--tg-text-hint);
        }
        #station-list-panel .panel-list .station-list-item .sli-info .queue-dot.low {
            background: var(--tg-green);
        }
        #station-list-panel .panel-list .station-list-item .sli-info .queue-dot.medium {
            background: var(--tg-orange);
        }
        #station-list-panel .panel-list .station-list-item .sli-info .queue-dot.high {
            background: var(--tg-red);
        }

        /* ===== Модалка фото ===== */
        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 900;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #photo-modal.show {
            display: flex;
        }
        #photo-modal img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--tg-radius-sm);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
        }
        #photo-modal .modal-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        #photo-modal .modal-close:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ===== Уведомления ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--tg-bg-card);
            color: var(--tg-text);
            padding: 12px 24px;
            border-radius: var(--tg-radius-sm);
            border: 1px solid var(--tg-border);
            box-shadow: var(--tg-shadow);
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            border-color: var(--tg-green);
            background: rgba(67, 181, 129, 0.15);
        }
        .toast.error {
            border-color: var(--tg-red);
            background: rgba(240, 71, 71, 0.15);
        }

        /* ===== Адаптив ===== */
        @media (max-width: 480px) {
            #app-header .logo {
                font-size: 15px;
            }
            #app-header .logo i {
                font-size: 18px;
            }
            #header-actions .badge {
                font-size: 10px;
                padding: 2px 8px;
            }
            .station-name {
                font-size: 17px;
            }
            .fuel-chip {
                font-size: 11px;
                padding: 4px 10px;
            }
            .comment-form .form-actions .submit-comment {
                font-size: 12px;
                padding: 6px 14px;
            }
            #bottom-sheet .sheet-body {
                padding: 8px 12px 16px;
            }
            #bottom-sheet {
                max-height: 80vh;
            }
            #station-list-toggle,
            #locate-btn {
                width: 42px;
                height: 42px;
                font-size: 16px;
                right: 12px;
            }
            #station-list-toggle {
                bottom: 180px;
            }
            #locate-btn {
                bottom: 120px;
            }
            #station-list-panel .panel-close {
                font-size: 12px;
                padding: 4px 12px;
            }
        }

        @media (max-height: 700px) {
            #bottom-sheet {
                max-height: 75vh;
            }
            #bottom-sheet .sheet-header {
                padding: 4px 12px 8px;
            }
            #bottom-sheet .sheet-body {
                padding: 6px 12px 12px;
            }
            .fuel-grid {
                margin: 6px 0 8px;
                gap: 4px;
            }
            .fuel-chip {
                font-size: 11px;
                padding: 3px 8px;
            }
            .queue-section {
                padding: 6px 10px;
                margin: 6px 0 8px;
            }
            .comments-section {
                margin-top: 10px;
                padding-top: 10px;
            }
            .comment-item {
                padding: 8px 10px;
                margin-bottom: 6px;
            }
            .comment-form {
                padding: 8px 10px;
                gap: 6px;
            }
            .comment-form textarea {
                min-height: 40px;
                font-size: 13px;
                padding: 6px 10px;
            }
            .station-name {
                font-size: 16px;
            }
        }

        /* Scrollbar */
        .sheet-body::-webkit-scrollbar,
        .panel-list::-webkit-scrollbar {
            width: 4px;
        }
        .sheet-body::-webkit-scrollbar-track,
        .panel-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .sheet-body::-webkit-scrollbar-thumb,
        .panel-list::-webkit-scrollbar-thumb {
            background: var(--tg-border);
            border-radius: 4px;
        }

        /* Убираем стандартные маркеры Leaflet */
        .leaflet-marker-icon {
            background: transparent !important;
            border: none !important;
        }
        .leaflet-marker-shadow {
            display: none !important;
        }
        .custom-marker {
            background: transparent;
            border: none;
        }

        /* Стиль для кнопок зума */
        .leaflet-control-zoom {
            border-radius: 12px !important;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
        .leaflet-control-zoom a {
            background: var(--tg-bg-card) !important;
            color: var(--tg-text) !important;
            border-color: var(--tg-border) !important;
            transition: all 0.2s;
        }
        .leaflet-control-zoom a:hover {
            background: var(--tg-bg-input) !important;
        }
    </style>
</head>
<body>

    <!-- ===== КАРТА ===== -->
    <div id="map"></div>

    <!-- ===== ШАПКА ===== -->
    <header id="app-header">
        <div class="logo">
            <i class="fas fa-gas-pump"></i>
            <span>Топливо Радар</span>
        </div>
        <div id="header-actions">
            <span class="badge"><i class="fas fa-location-dot"></i> Сургут</span>
            <button class="btn-icon" id="refresh-btn" title="Обновить заправки (TomTom)">
                <i class="fas fa-rotate"></i>
            </button>
        </div>
    </header>

    <!-- ===== КНОПКИ ===== -->
    <button id="locate-btn" title="Моё местоположение">
        <i class="fas fa-crosshairs"></i>
    </button>
    <button id="station-list-toggle" title="Список заправок">
        <i class="fas fa-list"></i>
    </button>

    <!-- ===== BOTTOM SHEET ===== -->
    <div id="bottom-sheet">
        <div class="sheet-handle" id="sheet-handle"></div>
        <div class="sheet-header">
            <h3 id="sheet-title"><i class="fas fa-gas-pump"></i> <span id="station-name-display">Заправка</span></h3>
            <button class="sheet-close" id="sheet-close"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="sheet-body" id="sheet-body">
            <div id="station-detail-content">
                <!-- Заполняется JS -->
            </div>
        </div>
    </div>

    <!-- ===== СПИСОК ЗАПРАВОК (панель) ===== -->
    <div id="station-list-panel">
        <div class="panel-header">
            <h4><i class="fas fa-list"></i> Все заправки</h4>
            <button class="panel-close" id="panel-close"><i class="fas fa-times"></i> Закрыть</button>
        </div>
        <div class="panel-search">
            <input type="text" id="station-search" placeholder="Поиск заправки..." />
        </div>
        <div class="panel-list" id="station-list"></div>
    </div>

    <!-- ===== МОДАЛКА ФОТО ===== -->
    <div id="photo-modal" onclick="closePhotoModal(event)">
        <button class="modal-close" onclick="closePhotoModal(event)"><i class="fas fa-xmark"></i></button>
        <img id="modal-photo-img" src="" alt="Фото" />
    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>

    <script>
        // ======================================================================
        // 1. КОНФИГУРАЦИЯ
        // ======================================================================
        const TOMTOM_API_KEY = 'f3zQs61g8ahbgxg99qOVRSJrB3HzDLuN';
        const SURGUT_CENTER = [61.254051, 73.396197];
        const MAP_ZOOM = 13;

        const FUEL_TYPES = [
            { id: 'ai-92', label: 'АИ-92', icon: 'fa-bolt' },
            { id: 'ai-95', label: 'АИ-95', icon: 'fa-bolt' },
            { id: 'ai-98', label: 'АИ-98', icon: 'fa-bolt' },
            { id: 'diesel', label: 'ДТ', icon: 'fa-truck' },
            { id: 'gas', label: 'Газ', icon: 'fa-fire' },
        ];

        const QUEUE_STATUSES = [
            { id: 'none', label: 'Нет очереди' },
            { id: 'low', label: 'Небольшая' },
            { id: 'medium', label: 'Средняя' },
            { id: 'high', label: 'Большая' },
        ];

        const STORAGE_KEY = 'fuel_radar_data';
        const STATIONS_KEY = 'fuel_radar_stations';

        // ======================================================================
        // 2. СОСТОЯНИЕ
        // ======================================================================
        let map = null;
        let mapMarkers = {};
        let currentStationId = null;
        let stationsData = {};
        let tomTomStations = {};
        let allStations = {};
        let isSheetOpen = false;
        let isListOpen = false;
        let pendingPhotos = [];

        // ======================================================================
        // 3. РАБОТА С ЛОКАЛЬНЫМ ХРАНИЛИЩЕМ
        // ======================================================================
        function loadLocalData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    stationsData = JSON.parse(raw);
                } else {
                    stationsData = {};
                }
                const rawStations = localStorage.getItem(STATIONS_KEY);
                if (rawStations) {
                    tomTomStations = JSON.parse(rawStations);
                } else {
                    tomTomStations = {};
                }
            } catch (e) {
                console.warn('Ошибка загрузки локальных данных:', e);
                stationsData = {};
                tomTomStations = {};
            }
            mergeStations();
        }

        function saveLocalData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(stationsData));
                localStorage.setItem(STATIONS_KEY, JSON.stringify(tomTomStations));
            } catch (e) {
                console.warn('Ошибка сохранения локальных данных:', e);
            }
        }

        function mergeStations() {
            allStations = {};
            for (const [id, data] of Object.entries(tomTomStations)) {
                allStations[id] = {
                    ...data,
                    userData: stationsData[id] || {},
                };
            }
            for (const [id, data] of Object.entries(stationsData)) {
                if (!allStations[id]) {
                    allStations[id] = {
                        id: id,
                        name: data.customName || 'Заправка',
                        address: data.customAddress || '',
                        lat: data.lat || 0,
                        lng: data.lng || 0,
                        userData: data,
                        isCustom: true,
                    };
                } else {
                    allStations[id].userData = data;
                }
            }
            // Если после объединения всё ещё пусто – добавляем тестовые заправки
            if (Object.keys(allStations).length === 0) {
                addDefaultStations();
            }
        }

        // ======================================================================
        // 4. ТЕСТОВЫЕ ЗАПРАВКИ (если TomTom не вернул данные)
        // ======================================================================
        function addDefaultStations() {
            const defaults = [
                { id: 'default1', name: 'АЗС №1 (Ленина)', address: 'ул. Ленина, 10', lat: 61.256, lng: 73.398 },
                { id: 'default2', name: 'АЗС №2 (Мира)', address: 'ул. Мира, 45', lat: 61.252, lng: 73.394 },
                { id: 'default3', name: 'АЗС №3 (Энергетиков)', address: 'ул. Энергетиков, 12', lat: 61.258, lng: 73.402 },
                { id: 'default4', name: 'АЗС №4 (Нефтяников)', address: 'ул. Нефтяников, 8', lat: 61.250, lng: 73.390 },
            ];
            for (const s of defaults) {
                tomTomStations[s.id] = s;
                if (!stationsData[s.id]) {
                    stationsData[s.id] = {
                        fuels: {},
                        queue: 'none',
                        comments: [],
                        stationPhotos: [],
                        logo: '',
                    };
                }
            }
            saveLocalData();
            mergeStations();
        }

        // ======================================================================
        // 5. ПОИСК ЗАПРАВОК ЧЕРЕЗ TOMTOM
        // ======================================================================
        async function searchGasStations(lat, lng) {
            const url =
                `https://api.tomtom.com/search/2/categorySearch/gas%20station.json?key=${TOMTOM_API_KEY}&lat=${lat}&lon=${lng}&radius=10000&limit=100&language=ru-RU`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const newStations = {};
                    for (const result of data.results) {
                        const id = result.id || `station_${Date.now()}_${Math.random()}`;
                        const position = result.position || { lat: 0, lon: 0 };
                        const poi = result.poi || {};
                        const address = result.address || {};

                        newStations[id] = {
                            id: id,
                            name: poi.name || 'АЗС',
                            address: address.freeformAddress || address.streetName || '',
                            lat: position.lat || 0,
                            lng: position.lon || 0,
                            poi: poi,
                            addressDetail: address,
                            tomtomId: id,
                        };
                        if (!stationsData[id]) {
                            stationsData[id] = {
                                fuels: {},
                                queue: 'none',
                                comments: [],
                                stationPhotos: [],
                                logo: '',
                            };
                        }
                    }

                    tomTomStations = { ...tomTomStations, ...newStations };
                    saveLocalData();
                    mergeStations();
                    renderMarkers();
                    renderStationList();
                    showToast(`Найдено ${Object.keys(newStations).length} заправок`, 'success');
                    return true;
                } else {
                    showToast('Заправки не найдены. Используются тестовые.', 'error');
                    if (Object.keys(tomTomStations).length === 0) {
                        addDefaultStations();
                    }
                    mergeStations();
                    renderMarkers();
                    renderStationList();
                    return false;
                }
            } catch (error) {
                console.error('Ошибка поиска заправок:', error);
                showToast('Ошибка загрузки. Используются тестовые.', 'error');
                if (Object.keys(tomTomStations).length === 0) {
                    addDefaultStations();
                }
                mergeStations();
                renderMarkers();
                renderStationList();
                return false;
            }
        }

        // ======================================================================
        // 6. МАРКЕРЫ (SVG с цветовой индикацией + прогресс-бар)
        // ======================================================================
        function getMarkerColor(stationId) {
            const st = allStations[stationId];
            if (!st) return '#5c5c60';
            const userData = st.userData || {};
            const fuels = userData.fuels || {};
            const fuelTypes = FUEL_TYPES.map(f => f.id);
            let availableCount = 0;
            let totalCount = 0;
            for (const f of fuelTypes) {
                const fuel = fuels[f];
                if (fuel !== undefined) {
                    totalCount++;
                    if (fuel.available === true) availableCount++;
                }
            }
            if (totalCount === 0) return '#5c5c60';
            if (availableCount === totalCount) return '#43b581';
            if (availableCount === 0) return '#f04747';
            return '#faa61a';
        }

        function createSVGMarker(stationId) {
            const st = allStations[stationId];
            if (!st) return L.divIcon({ className: 'custom-marker', html: '' });
            const userData = st.userData || {};
            const queue = userData.queue || 'none';
            const fuelColor = getMarkerColor(stationId);

            // Процент для прогресс-бара
            let percent = 0;
            let queueColor = '#5c5c60';
            switch (queue) {
                case 'none':
                    percent = 0;
                    queueColor = '#5c5c60';
                    break;
                case 'low':
                    percent = 33;
                    queueColor = '#43b581';
                    break;
                case 'medium':
                    percent = 66;
                    queueColor = '#faa61a';
                    break;
                case 'high':
                    percent = 100;
                    queueColor = '#f04747';
                    break;
            }

            // Иконка заправочной колонки (цвет меняется в зависимости от топлива)
            const svgIcon = `
                <svg fill="${fuelColor}" viewBox="0 0 512 512" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
                    <path d="M336 448H16c-8.8 0-16 7.2-16 16v32c0 8.8 7.2 16 16 16h320c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zm157.2-340.7l-81-81c-6.2-6.2-16.4-6.2-22.6 0l-11.3 11.3c-6.2 6.2-6.2 16.4 0 22.6L416 97.9V160c0 28.1 20.9 51.3 48 55.2V376c0 13.2-10.8 24-24 24s-24-10.8-24-24v-32c0-48.6-39.4-88-88-88h-8V64c0-35.3-28.7-64-64-64H96C60.7 0 32 28.7 32 64v352h288V304h8c22.1 0 40 17.9 40 40v27.8c0 37.7 27 72 64.5 75.9 43 4.3 79.5-29.5 79.5-71.7V152.6c0-17-6.8-33.3-18.8-45.3zM256 192H96V64h160v128z"/>
                </svg>
            `;

            const html = `
                <div style="display:flex;flex-direction:column;align-items:center;width:40px;cursor:pointer;">
                    ${svgIcon}
                    <div style="width:32px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:2px;overflow:hidden;">
                        <div style="width:${percent}%;height:100%;background:${queueColor};border-radius:2px;transition:width 0.2s;"></div>
                    </div>
                </div>
            `;

            return L.divIcon({
                className: 'custom-marker',
                html: html,
                iconSize: [40, 40],
                iconAnchor: [20, 40],
                popupAnchor: [0, -10],
            });
        }

        function renderMarkers() {
            for (const [id, marker] of Object.entries(mapMarkers)) {
                map.removeLayer(marker);
            }
            mapMarkers = {};

            const stationIds = Object.keys(allStations);
            if (stationIds.length === 0) return;

            for (const [id, st] of Object.entries(allStations)) {
                if (!st.lat || !st.lng) continue;
                const icon = createSVGMarker(id);
                const marker = L.marker([st.lat, st.lng], { icon })
                    .addTo(map)
                    .on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        openStation(id);
                    });
                mapMarkers[id] = marker;
            }
        }

        // ======================================================================
        // 7. ОТКРЫТЬ / ЗАКРЫТЬ СТАНЦИЮ
        // ======================================================================
        function openStation(stationId) {
            currentStationId = stationId;
            const st = allStations[stationId];
            if (!st) {
                showToast('Заправка не найдена', 'error');
                return;
            }

            document.getElementById('station-name-display').textContent = st.name || 'АЗС';
            renderStationDetail(stationId);
            openSheet();

            if (st.lat && st.lng) {
                map.setView([st.lat, st.lng], 15, { animate: true });
            }

            for (const [id, marker] of Object.entries(mapMarkers)) {
                const el = marker.getElement();
                if (el) {
                    el.style.transform = id === stationId ? 'scale(1.25)' : 'scale(1)';
                    el.style.transition = 'transform 0.2s';
                }
            }
        }

        function openSheet() {
            isSheetOpen = true;
            document.getElementById('bottom-sheet').classList.add('open');
        }

        function closeSheet() {
            isSheetOpen = false;
            document.getElementById('bottom-sheet').classList.remove('open');
            for (const [id, marker] of Object.entries(mapMarkers)) {
                const el = marker.getElement();
                if (el) {
                    el.style.transform = 'scale(1)';
                }
            }
            currentStationId = null;
        }

        // ======================================================================
        // 8. РЕНДЕР ДЕТАЛЕЙ СТАНЦИИ
        // ======================================================================
        function renderStationDetail(stationId) {
            const container = document.getElementById('station-detail-content');
            const st = allStations[stationId];
            if (!st) {
                container.innerHTML = '<p style="color:var(--tg-text-secondary);">Заправка не найдена</p>';
                return;
            }

            const userData = st.userData || {};
            const fuels = userData.fuels || {};
            const queue = userData.queue || 'none';
            const comments = userData.comments || [];
            const stationPhotos = userData.stationPhotos || [];
            const logo = userData.logo || '';

            let html = `
                <div class="station-logo-wrapper">
                    ${logo ? `<img src="${logo}" class="station-logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233a3a3e%22/%3E%3Ctext x=%2250%22 y=%2260%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%238e8e93%22%3E⛽%3C/text%3E%3C/svg%3E'" />` : `<img src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233a3a3e%22/%3E%3Ctext x=%2250%22 y=%2260%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%238e8e93%22%3E⛽%3C/text%3E%3C/svg%3E" class="station-logo" />`}
                    <div>
                        <div class="station-name">
                            ${st.name || 'АЗС'}
                            <span class="station-id">${st.id ? st.id.slice(0, 8) : ''}</span>
                        </div>
                        <div class="station-address">
                            <i class="fas fa-location-dot"></i> ${st.address || 'Адрес не указан'}
                        </div>
                    </div>
                </div>
            `;

            html += `<div class="fuel-grid">`;
            for (const fuel of FUEL_TYPES) {
                const f = fuels[fuel.id] || { available: false, price: null };
                const available = f.available === true;
                const price = f.price !== undefined && f.price !== null && f.price !== '' ? f.price : null;
                html += `
                    <div class="fuel-chip ${available ? 'available' : 'unavailable'}">
                        <i class="fas ${fuel.icon}"></i>
                        ${fuel.label}
                        ${price ? `<span class="fuel-price">${price} ₽</span>` : ''}
                        <span class="fuel-status">${available ? '✅' : '❌'}</span>
                    </div>
                `;
            }
            html += `</div>`;

            html += `
                <div class="fuel-update-section">
                    <div style="font-size:13px;font-weight:500;margin-bottom:6px;color:var(--tg-text-secondary);">
                        <i class="fas fa-pen"></i> Обновить топливо:
                    </div>
                    <div class="fuel-toggle-row">
            `;
            for (const fuel of FUEL_TYPES) {
                const f = fuels[fuel.id] || { available: false, price: '' };
                const checked = f.available === true ? 'checked' : '';
                const priceVal = f.price !== undefined && f.price !== null && f.price !== '' ? f.price : '';
                html += `
                    <label>
                        <input type="checkbox" class="fuel-checkbox" data-fuel="${fuel.id}" ${checked} />
                        ${fuel.label}
                        <input type="number" class="fuel-price-input" data-fuel="${fuel.id}" placeholder="₽" value="${priceVal}" step="0.1" min="0" style="width:55px;" />
                    </label>
                `;
            }
            html += `
                    </div>
                    <button class="save-fuels-btn" id="save-fuels-btn">Сохранить</button>
                </div>
            `;

            html += `
                <div class="queue-section">
                    <span class="queue-label"><i class="fas fa-users"></i> Очередь:</span>
                    <span class="queue-badge ${queue}">${QUEUE_STATUSES.find(q => q.id === queue)?.label || 'Нет'}</span>
                    <div class="queue-actions">
            `;
            for (const q of QUEUE_STATUSES) {
                html += `
                    <button class="queue-btn ${q.id === queue ? 'active' : ''}" data-queue="${q.id}">${q.label}</button>
                `;
            }
            html += `
                    </div>
                </div>
            `;

            // Загрузка логотипа
            html += `
                <div style="margin:10px 0;">
                    <div style="font-size:13px;font-weight:500;color:var(--tg-text-secondary);margin-bottom:4px;">
                        <i class="fas fa-image"></i> Логотип заправки (URL)
                    </div>
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="logo-url-input" placeholder="https://example.com/logo.png" value="${logo}" style="flex:1;background:var(--tg-bg-input);border:1px solid var(--tg-border);border-radius:var(--tg-radius-xs);padding:8px 12px;color:var(--tg-text);font-size:14px;" />
                        <button id="save-logo-btn" style="background:var(--tg-accent);border:none;color:#fff;padding:8px 16px;border-radius:var(--tg-radius-xs);cursor:pointer;font-weight:600;">Сохранить</button>
                    </div>
                </div>
            `;

            if (stationPhotos.length > 0) {
                html += `
                    <div style="margin:8px 0 10px;display:flex;flex-wrap:wrap;gap:6px;">
                        ${stationPhotos.map(p => `<img src="${p}" style="width:60px;height:60px;object-fit:cover;border-radius:var(--tg-radius-xs);border:1px solid var(--tg-border);cursor:pointer;" onclick="openPhotoModal('${p}')" />`).join('')}
                    </div>
                `;
            }

            html += `
                <div class="comments-section">
                    <div class="section-title"><i class="fas fa-comment"></i> Комментарии (${comments.length})</div>
            `;

            if (comments.length === 0) {
                html += `<p style="color:var(--tg-text-secondary);font-size:13px;">Пока нет комментариев. Будьте первым!</p>`;
            } else {
                const sorted = [...comments].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                const recent = sorted.slice(0, 10);
                for (const c of recent) {
                    const date = c.timestamp ? new Date(c.timestamp).toLocaleString('ru-RU') : '';
                    html += `
                        <div class="comment-item">
                            <div class="comment-meta">
                                <span class="comment-user"><i class="fas fa-user"></i> ${c.user || 'Аноним'}</span>
                                <span>${date}</span>
                            </div>
                            <div class="comment-text">${escapeHtml(c.text || '')}</div>
                            ${c.photos && c.photos.length > 0 ? `
                                <div class="comment-photos">
                                    ${c.photos.map(p => `<img src="${p}" onclick="openPhotoModal('${p}')" />`).join('')}
                                </div>
                            ` : ''}
                            <button class="comment-delete" onclick="deleteComment('${stationId}','${c.id}')">
                                <i class="fas fa-trash-can"></i> Удалить
                            </button>
                        </div>
                    `;
                }
            }

            html += `
                <div class="comment-form">
                    <textarea id="comment-text" placeholder="Поделитесь информацией о заправке..."></textarea>
                    <div class="form-actions">
                        <button class="photo-upload-btn" id="comment-photo-btn">
                            <i class="fas fa-camera"></i> Фото
                        </button>
                        <span id="photo-count" style="font-size:12px;color:var(--tg-text-secondary);">0 фото</span>
                        <button class="submit-comment" id="submit-comment-btn">Отправить</button>
                    </div>
                    <div class="photo-preview" id="photo-preview"></div>
                    <input type="file" id="comment-file-input" accept="image/*" multiple style="display:none;" />
                </div>
            `;

            html += `</div>`;
            container.innerHTML = html;

            // Обработчики
            document.getElementById('save-fuels-btn')?.addEventListener('click', () => {
                saveFuels(stationId);
            });

            document.querySelectorAll('.queue-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const q = btn.dataset.queue;
                    updateStationData(stationId, { queue: q });
                    renderStationDetail(stationId);
                    renderMarkers();
                    renderStationList();
                    showToast(`Очередь: ${QUEUE_STATUSES.find(s => s.id === q)?.label}`, 'success');
                });
            });

            // Сохранение логотипа
            document.getElementById('save-logo-btn')?.addEventListener('click', () => {
                const url = document.getElementById('logo-url-input').value.trim();
                if (url) {
                    updateStationData(stationId, { logo: url });
                    renderStationDetail(stationId);
                    renderStationList();
                    showToast('Логотип обновлён', 'success');
                } else {
                    showToast('Введите URL логотипа', 'error');
                }
            });

            const fileInput = document.getElementById('comment-file-input');
            document.getElementById('comment-photo-btn')?.addEventListener('click', () => {
                fileInput?.click();
            });
            fileInput?.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files) {
                    for (const file of files) {
                        if (file.size > 5 * 1024 * 1024) {
                            showToast('Файл слишком большой (макс. 5 МБ)', 'error');
                            continue;
                        }
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const dataUrl = ev.target.result;
                            pendingPhotos.push(dataUrl);
                            renderPhotoPreview();
                            updatePhotoCount();
                        };
                        reader.readAsDataURL(file);
                    }
                }
                fileInput.value = '';
            });

            document.getElementById('submit-comment-btn')?.addEventListener('click', () => {
                submitComment(stationId);
            });

            document.getElementById('comment-text')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitComment(stationId);
                }
            });

            updatePhotoCount();
            renderPhotoPreview();
        }

        // ======================================================================
        // 9. ФУНКЦИИ ДЛЯ ТОПЛИВА
        // ======================================================================
        function saveFuels(stationId) {
            const checkboxes = document.querySelectorAll('.fuel-checkbox');
            const inputs = document.querySelectorAll('.fuel-price-input');
            const fuels = {};

            checkboxes.forEach(cb => {
                const fuelId = cb.dataset.fuel;
                const priceInput = document.querySelector(`.fuel-price-input[data-fuel="${fuelId}"]`);
                const price = priceInput ? parseFloat(priceInput.value) : null;
                fuels[fuelId] = {
                    available: cb.checked,
                    price: (price && price > 0) ? price : null,
                };
            });

            updateStationData(stationId, { fuels: fuels });
            renderStationDetail(stationId);
            renderMarkers();
            renderStationList();
            showToast('Данные о топливе обновлены!', 'success');
        }

        // ======================================================================
        // 10. ФУНКЦИИ ДЛЯ КОММЕНТАРИЕВ
        // ======================================================================
        function submitComment(stationId) {
            const textEl = document.getElementById('comment-text');
            const text = textEl?.value?.trim();
            if (!text && pendingPhotos.length === 0) {
                showToast('Напишите текст или добавьте фото', 'error');
                return;
            }

            const userData = getStationData(stationId);
            if (!userData.comments) userData.comments = [];

            const comment = {
                id: `c_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                user: 'Пользователь',
                text: text || '',
                timestamp: Date.now(),
                photos: [...pendingPhotos],
            };

            userData.comments.push(comment);
            updateStationData(stationId, { comments: userData.comments });

            pendingPhotos = [];
            if (textEl) textEl.value = '';
            renderStationDetail(stationId);
            renderStationList();
            showToast('Комментарий добавлен!', 'success');
        }

        function deleteComment(stationId, commentId) {
            if (!confirm('Удалить комментарий?')) return;
            const userData = getStationData(stationId);
            if (!userData.comments) return;
            userData.comments = userData.comments.filter(c => c.id !== commentId);
            updateStationData(stationId, { comments: userData.comments });
            renderStationDetail(stationId);
            renderStationList();
            showToast('Комментарий удалён', 'success');
        }

        function renderPhotoPreview() {
            const container = document.getElementById('photo-preview');
            if (!container) return;
            if (pendingPhotos.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = pendingPhotos.map((p, idx) => `
                <div style="position:relative;display:inline-block;">
                    <img src="${p}" />
                    <button class="remove-photo" onclick="removePendingPhoto(${idx})">✕</button>
                </div>
            `).join('');
        }

        function updatePhotoCount() {
            const el = document.getElementById('photo-count');
            if (el) el.textContent = `${pendingPhotos.length} фото`;
        }

        function removePendingPhoto(idx) {
            pendingPhotos.splice(idx, 1);
            renderPhotoPreview();
            updatePhotoCount();
        }

        // ======================================================================
        // 11. ОБНОВЛЕНИЕ ДАННЫХ СТАНЦИИ
        // ======================================================================
        function getStationData(stationId) {
            if (!stationsData[stationId]) {
                stationsData[stationId] = {
                    fuels: {},
                    queue: 'none',
                    comments: [],
                    stationPhotos: [],
                    logo: '',
                    lastUpdated: Date.now(),
                };
                saveLocalData();
            }
            return stationsData[stationId];
        }

        function updateStationData(stationId, updates) {
            const data = getStationData(stationId);
            Object.assign(data, updates);
            data.lastUpdated = Date.now();
            saveLocalData();
            mergeStations();
            renderMarkers();
            renderStationList();
            return data;
        }

        // ======================================================================
        // 12. СПИСОК ЗАПРАВОК
        // ======================================================================
        function renderStationList(filter = '') {
            const container = document.getElementById('station-list');
            const ids = Object.keys(allStations);
            if (ids.length === 0) {
                container.innerHTML =
                    '<p style="color:var(--tg-text-secondary);text-align:center;padding:20px;">Нет заправок</p>';
                return;
            }

            let html = '';
            const search = filter.toLowerCase().trim();

            for (const [id, st] of Object.entries(allStations)) {
                const name = st.name || 'АЗС';
                const address = st.address || '';
                if (search && !name.toLowerCase().includes(search) && !address.toLowerCase().includes(search)) continue;

                const userData = st.userData || {};
                const queue = userData.queue || 'none';
                const hasFuel = Object.values(userData.fuels || {}).some(f => f.available === true);
                const fuelCount = Object.values(userData.fuels || {}).filter(f => f.available === true).length;
                const logo = userData.logo || '';

                html += `
                    <div class="station-list-item" data-id="${id}">
                        <div class="sli-left">
                            <img src="${logo || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233a3a3e%22/%3E%3Ctext x=%2250%22 y=%2260%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%238e8e93%22%3E⛽%3C/text%3E%3C/svg%3E'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%233a3a3e%22/%3E%3Ctext x=%2250%22 y=%2260%22 font-size=%2240%22 text-anchor=%22middle%22 fill=%22%238e8e93%22%3E⛽%3C/text%3E%3C/svg%3E'" />
                            <div>
                                <div class="sli-name">${name}</div>
                                <div style="font-size:12px;color:var(--tg-text-secondary);">${address || 'Адрес не указан'}</div>
                            </div>
                        </div>
                        <div class="sli-info">
                            <span>${hasFuel ? `⛽ ${fuelCount} вида` : '⛔ нет топлива'}</span>
                            <span class="queue-dot ${queue}"></span>
                            <span style="font-size:11px;color:var(--tg-text-hint);">${QUEUE_STATUSES.find(q => q.id === queue)?.label || 'Нет'}</span>
                        </div>
                    </div>
                `;
            }

            if (!html) {
                html = '<p style="color:var(--tg-text-secondary);text-align:center;padding:20px;">Ничего не найдено</p>';
            }

            container.innerHTML = html;

            container.querySelectorAll('.station-list-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    closeListPanel();
                    openStation(id);
                });
            });
        }

        function openListPanel() {
            isListOpen = true;
            document.getElementById('station-list-panel').classList.add('open');
            renderStationList();
        }

        function closeListPanel() {
            isListOpen = false;
            document.getElementById('station-list-panel').classList.remove('open');
        }

        // ======================================================================
        // 13. ФОТО МОДАЛКА
        // ======================================================================
        function openPhotoModal(src) {
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('modal-photo-img');
            img.src = src;
            modal.classList.add('show');
        }

        function closePhotoModal(e) {
            if (e && e.target !== e.currentTarget && e.target.tagName !== 'BUTTON') return;
            document.getElementById('photo-modal').classList.remove('show');
        }

        // ======================================================================
        // 14. TOAST
        // ======================================================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ======================================================================
        // 15. ВСПОМОГАТЕЛЬНЫЕ
        // ======================================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        map.setView([latitude, longitude], 15, { animate: true });
                        searchGasStations(latitude, longitude);
                        showToast('Позиция обновлена', 'success');
                    },
                    () => {
                        showToast('Не удалось определить местоположение', 'error');
                    }, { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                showToast('Геолокация не поддерживается', 'error');
            }
        }

        // ======================================================================
        // 16. ИНИЦИАЛИЗАЦИЯ КАРТЫ (С FALLBACK)
        // ======================================================================
        function initMap() {
            map = L.map('map', {
                center: SURGUT_CENTER,
                zoom: MAP_ZOOM,
                zoomControl: true,
                attributionControl: false,
            });

            // Пытаемся загрузить TomTom, если не получается – OSM
            const tomtomLayer = L.tileLayer(
                `https://api.tomtom.com/map/1/tile/basic/night/{z}/{x}/{y}.png?key=${TOMTOM_API_KEY}&tileSize=512`, {
                    attribution: '© TomTom',
                    maxZoom: 22,
                    tileSize: 512,
                    zoomOffset: -1,
                });

            const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19,
            });

            tomtomLayer.addTo(map);

            let tomtomFailed = false;
            map.on('tileerror', function(e) {
                if (!tomtomFailed && e.tile.src.indexOf('tomtom') !== -1) {
                    tomtomFailed = true;
                    map.removeLayer(tomtomLayer);
                    osmLayer.addTo(map);
                    showToast('TomTom недоступен, использован OpenStreetMap', 'error');
                }
            });

            setTimeout(() => {
                map.invalidateSize();
            }, 200);

            window.addEventListener('resize', () => {
                map.invalidateSize();
            });

            map.on('click', () => {
                closeSheet();
                closeListPanel();
            });

            loadLocalData();
            searchGasStations(SURGUT_CENTER[0], SURGUT_CENTER[1]);
        }

        // ======================================================================
        // 17. ЗАПУСК
        // ======================================================================
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if (window.Telegram && Telegram.WebApp) {
                    const tg = Telegram.WebApp;
                    tg.expand();
                    const theme = tg.themeParams || {};
                    if (theme.bg_color) document.documentElement.style.setProperty('--tg-bg', theme.bg_color);
                    if (theme.secondary_bg_color) document.documentElement.style.setProperty('--tg-bg-secondary', theme
                        .secondary_bg_color);
                    if (theme.text_color) document.documentElement.style.setProperty('--tg-text', theme.text_color);
                    if (theme.hint_color) document.documentElement.style.setProperty('--tg-text-secondary', theme
                        .hint_color);
                    if (theme.accent_text_color) document.documentElement.style.setProperty('--tg-accent', theme
                        .accent_text_color);
                    if (theme.section_bg_color) document.documentElement.style.setProperty('--tg-bg-card', theme
                        .section_bg_color);
                    if (theme.section_header_text_color) document.documentElement.style.setProperty('--tg-text-hint',
                        theme.section_header_text_color);
                }
            } catch (e) {}

            initMap();

            document.getElementById('sheet-close').addEventListener('click', closeSheet);
            document.getElementById('sheet-handle').addEventListener('click', () => {
                if (isSheetOpen) closeSheet();
            });

            let startY = 0;
            const sheet = document.getElementById('bottom-sheet');
            sheet.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            });
            sheet.addEventListener('touchmove', (e) => {
                const dy = e.touches[0].clientY - startY;
                if (dy > 60 && isSheetOpen) {
                    closeSheet();
                }
            });

            document.getElementById('station-list-toggle').addEventListener('click', () => {
                if (isListOpen) closeListPanel();
                else openListPanel();
            });
            document.getElementById('panel-close').addEventListener('click', closeListPanel);

            document.getElementById('station-search').addEventListener('input', (e) => {
                renderStationList(e.target.value);
            });

            document.getElementById('locate-btn').addEventListener('click', getLocation);

            document.getElementById('refresh-btn').addEventListener('click', () => {
                const center = map.getCenter();
                searchGasStations(center.lat, center.lng);
                showToast('Обновление...', 'info');
            });

            document.addEventListener('click', (e) => {
                if (isListOpen) {
                    const panel = document.getElementById('station-list-panel');
                    const toggle = document.getElementById('station-list-toggle');
                    if (!panel.contains(e.target) && !toggle.contains(e.target)) {
                        closeListPanel();
                    }
                }
            });

            console.log('🚗 Топливо Радар — Сургут загружен!');
        });

        // Глобальные экспорты
        window.openStation = openStation;
        window.closeSheet = closeSheet;
        window.openPhotoModal = openPhotoModal;
        window.closePhotoModal = closePhotoModal;
        window.deleteComment = deleteComment;
        window.removePendingPhoto = removePendingPhoto;
        window.renderStationDetail = renderStationDetail;
        window.showToast = showToast;
    </script>
</body>
</html>
